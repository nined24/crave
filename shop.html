<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Crave</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shop.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Delivery Banner -->
    <div class="delivery-banner">
        DELIVERING ALL OVER MUMBAI
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-left">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="index.html#about" class="nav-link">ABOUT</a>
                <div class="dropdown">
                    <a href="shop.html" class="nav-link dropdown-toggle">CATEGORIES</a>
                    <div class="dropdown-menu">
                        <a href="shop.html?category=sandwiches" data-category="sandwiches">Sandwiches</a>
                        <a href="shop.html?category=granolas" data-category="granolas">Granolas</a>
                        <a href="shop.html?category=cookies" data-category="cookies">Cookies</a>
                        <a href="shop.html?category=cakes" data-category="cakes">Cakes</a>
                    </div>
                </div>
                <a href="shop.html" class="nav-link active">SHOP</a>
            </div>
            <div class="nav-right">
                <div class="logo">
                    <div class="logo-text">
                        <span class="logo-c">C</span>rav<span class="logo-e">é</span>
                    </div>
                </div>
            </div>
            <div class="nav-actions">
                <button class="icon-btn nav-icon mobile-cart-btn" id="cartBtn" aria-label="Cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                <a href="login.html" class="nav-link mobile-login-btn" id="loginLink">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="login-text">Login</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Shop Header -->
    <section class="shop-header">
        <div class="container">
            <h1 class="shop-title">Our Products</h1>
            <p class="shop-subtitle">Discover our delicious collection of baked goods</p>
        </div>
    </section>

    <!-- Search and Filter Section -->
    <section class="shop-filters">
        <div class="container">
            <div class="filters-container">
                <div class="search-box">
                    <input type="text" id="productSearch" placeholder="Search products..." class="search-input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="cookies">Cookies</button>
                    <button class="filter-btn" data-category="sandwiches">Sandwiches</button>
                    <button class="filter-btn" data-category="granolas">Granolas</button>
                    <button class="filter-btn" data-category="cakes">Cakes</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="shop-products">
        <div class="container">
            <div id="productsGrid" class="shop-grid">
                <!-- Products will be dynamically loaded here -->
            </div>
            <div id="noResults" class="no-results" style="display: none;">
                <p>No products found. Try a different search or category.</p>
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-modal-content">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <button class="close-cart" id="closeCart">&times;</button>
            </div>
            <div class="cart-items" id="cartItems">
                <p class="empty-cart">Your cart is empty</p>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <strong>Total: <span id="cartTotal">₹0</span></strong>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Product Details Modal -->
    <div class="product-modal" id="productModal">
        <div class="product-modal-content">
            <button class="close-product-modal" id="closeProductModal">&times;</button>
            <div class="product-modal-body">
                <div class="product-modal-gallery">
                    <div class="modal-image-container">
                        <button class="carousel-btn prev" id="modalPrevBtn" aria-label="Previous Image">&#10094;</button>
                        <img id="modalMainImage" src="" alt="Product Image">
                        <button class="carousel-btn next" id="modalNextBtn" aria-label="Next Image">&#10095;</button>
                    </div>
                    <!-- Thumbnails container (for future multiple images) -->
                    <div class="product-modal-thumbnails" id="modalThumbnails"></div>
                </div>
                <div class="product-modal-info">
                    <div class="product-modal-category" id="modalCategory"></div>
                    <h2 id="modalTitle"></h2>
                    <p class="product-modal-oneliner" id="modalOneLiner"></p>
                    <p class="product-modal-desc" id="modalDesc"></p>
                    <div class="product-modal-price" id="modalPrice"></div>
                    <div id="modalCartAction"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="shop.js"></script>
</body>
</html>
